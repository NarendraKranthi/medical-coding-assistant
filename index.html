<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Medical Coding Assistant</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
.header { background:#2d6cdf; color:white; padding:15px; text-align:center; font-size:20px; }
.container { padding:15px; }
textarea { width:100%; height:130px; padding:10px; border-radius:8px; border:1px solid #ccc; }
select, button { width:100%; padding:10px; margin-top:10px; border-radius:6px; }
button { background:#2d6cdf; color:white; border:none; }
.card { padding:12px; border-radius:10px; margin-top:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.red { background:#ffe5e5; }
.orange { background:#fff3cd; }
.green { background:#e6ffe6; }
.code { font-weight:bold; color:#2d6cdf; }
</style>
</head>

<body>

<div class="header">🏥 Medical Coding Assistant</div>

<div class="container">

<select id="state">
  <option value="general">General</option>
  <option value="CA">California</option>
  <option value="TX">Texas</option>
  <option value="NY">New York</option>
</select>

<textarea id="input" placeholder="99213 - I10
20553 - M54.59"></textarea>

<button onclick="runAudit()">Run Audit</button>

<div id="result"></div>

</div>

<script>

/* 🔗 YOUR BACKEND */
const API = "https://medical-coding-assistant-1.onrender.com";

/* ---------- LOAD NCCI ---------- */
let ncciData=[];
fetch("ncci.csv").then(r=>r.text()).then(t=>{
  let rows=t.split("\n").slice(1);
  ncciData=rows.map(r=>{
    let c=r.split(",");
    return {cpt:c[1], mod:c[5]||c[4]};
  });
});

/* ---------- EXCLUDES ---------- */
let EXCLUDES={};
fetch("icd_excludes1.json").then(r=>r.json()).then(d=>EXCLUDES=d);

/* ---------- HELPERS ---------- */
function getCat(x){return x.split(".")[0];}

function parse(text){
  return text.split("\n").map(l=>{
    let p=l.split("-");
    return {
      cpt:p[0]?.trim(),
      icd:p[1]?.split(",").map(x=>x.trim())||[]
    };
  }).filter(x=>x.cpt);
}

/* ---------- CMS FETCH ---------- */
async function fetchCMS(cpt,state){
  try{
    let res=await fetch(`${API}/lcd/${cpt}/${state}`);
    return await res.json();
  }catch{
    return null;
  }
}

/* ---------- MAIN AUDIT ---------- */
async function runAudit(){

  let input=document.getElementById("input").value;
  let state=document.getElementById("state").value;
  let data=parse(input);

  let html="";
  let allICD=[];

  for(let d of data){

    allICD.push(...d.icd);

    let cms=await fetchCMS(d.cpt,state);

    let cls="orange";
    let text="";
    let confidence=0;

    /* E/M */
    if(/^99/.test(d.cpt)){
      cls="green";
      text="🟢 E/M Service (Covered)";
      confidence=100;
    }

    /* CMS LOGIC */
    else if(cms && cms.icds){

      let exactMatch = d.icd.some(icd =>
        cms.icds.includes(icd)
      );

      let categoryMatch = d.icd.some(icd =>
        cms.icds.some(c => c.startsWith(getCat(icd)))
      );

      if(exactMatch){
        cls="green";
        confidence=100;
        text=`🟢 Supported (${state} | ${cms.lcd})`;
      }

      else if(categoryMatch){
        cls="orange";
        confidence=70;

        let suggestion = cms.icds.slice(0,3).join(", ");

        text=`🟠 Partial Match (${state} | ${cms.lcd})<br><br>
        Reason: Diagnosis category matches but not exact<br>
        Suggestion: ${suggestion}`;
      }

      else{
        cls="red";
        confidence=20;

        let suggestion = cms.icds.slice(0,3).join(", ");

        text=`🔴 Not Supported (${state} | ${cms.lcd})<br><br>
        Reason: ICD not covered under LCD<br>
        Suggested ICD: ${suggestion}`;
      }
    }

    else{
      cls="orange";
      text="🟠 No CMS Data";
      confidence=50;
    }

    html+=`
    <div class="card ${cls}">
      <div class="code">CPT ${d.cpt}</div>
      ICD: ${d.icd.join(", ")}<br><br>
      ${text}<br><br>
      <b>Confidence:</b> ${confidence}%
    </div>`;
  }

  /* ---------- EXCLUDES1 CHECK ---------- */
  let seenEx=new Set();

  for(let i=0;i<allICD.length;i++){
    for(let j=i+1;j<allICD.length;j++){

      let a=allICD[i], b=allICD[j];
      let key=a+"-"+b;

      if(EXCLUDES[a]?.includes(b) && !seenEx.has(key)){
        seenEx.add(key);

        html+=`<div class="card red">
        ${a} + ${b} → ❌ Excludes1 Conflict
        </div>`;
      }
    }
  }

  /* ---------- NCCI CHECK ---------- */
  let cpts=data.map(x=>x.cpt);
  let seen=new Set();

  for(let i=0;i<cpts.length;i++){
    for(let j=i+1;j<cpts.length;j++){

      let a=cpts[i], b=cpts[j];
      let key=a+"-"+b;

      if(seen.has(key)) continue;

      let match = ncciData.find(r =>
        (r.cpt===a || r.cpt===b)
      );

      if(match){
        seen.add(key);

        html+=`<div class="card orange">
        ${a} + ${b} → ⚠️ Modifier ${match.mod || "59"}
        </div>`;
      }
    }
  }

  document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
