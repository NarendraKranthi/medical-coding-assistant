<!DOCTYPE html><html>
<head>
<title>Medical Coding Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body { font-family: Arial; background:#eef2f7; margin:0; }
.header { background:#2563eb; color:white; padding:15px; text-align:center; font-weight:bold; }

.container { max-width:700px; margin:20px auto; background:white; padding:20px; border-radius:10px; }

.tab { display:flex; margin-bottom:15px; }
.tab button {
  flex:1; padding:10px; border:none; cursor:pointer;
  background:#e5e7eb;
}
.tab button.active { background:#2563eb; color:white; }

input, textarea {
  width:100%; padding:10px; margin-top:8px;
  border-radius:6px; border:1px solid #ccc;
}

button.action {
  margin-top:10px; background:#2563eb; color:white;
  border:none; padding:10px; border-radius:6px;
}

.result-box {
  margin-top:10px; padding:10px; border-radius:6px;
}

.ok { background:#ecfdf5; }
.warn { background:#fff7ed; }
.error { background:#fee2e2; }

.cpt { background:#dbeafe; padding:2px 5px; border-radius:4px; }
.icd { background:#dcfce7; padding:2px 5px; border-radius:4px; }

</style></head><body><div class="header">🏥 Medical Coding Assistant</div><div class="container"><!-- TABS --><div class="tab">
  <button class="active" onclick="showTab('denial')">Denial</button>
  <button onclick="showTab('audit')">Audit</button>
</div><!-- DENIAL TOOL --><div id="denialTab">  <input id="query" placeholder="Enter denial / CPT / ICD">
  <input id="payer" placeholder="Insurance (optional)">
  <button class="action" onclick="search()">Search</button>  <div id="result"></div></div><!-- AUDIT TOOL --><div id="auditTab" style="display:none;">  <textarea id="auditInput" rows="6" placeholder="Example:
99213 - 25 - M54.59,M54.41
97810 - M54.2
20553 - M53.3"></textarea><button class="action" onclick="runAudit()">Run Audit</button>

  <div id="auditResult"></div></div></div><script>

// TAB SWITCH
function showTab(tab){
  document.getElementById("denialTab").style.display = tab==="denial"?"block":"none";
  document.getElementById("auditTab").style.display = tab==="audit"?"block":"none";

  document.querySelectorAll(".tab button").forEach(btn=>btn.classList.remove("active"));
  event.target.classList.add("active");
}

// DENIAL SEARCH
async function search(){
  let query = document.getElementById("query").value;
  let payer = document.getElementById("payer").value;

  document.getElementById("result").innerHTML="Loading...";

  let res = await fetch("https://medical-coding-assistant.onrender.com/api/search",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({query,payer})
  });

  let data = await res.json();

  let text = data.answer
    .replace(/\n/g,"<br>")
    .replace(/\b\d{5}\b/g, m=>`<span class="cpt">${m}</span>`)
    .replace(/\b[A-TV-Z]\d{2}(\.\d+)?\b/g, m=>`<span class="icd">${m}</span>`);

  document.getElementById("result").innerHTML = `<div class="result-box ok">${text}</div>`;
}

// AUDIT ENGINE
function runAudit(){

  let lines = document.getElementById("auditInput").value.trim().split("\n");
  let allCPTs = lines.map(l=>l.split("-")[0].trim());

  let output="";

  const NCCI = [
    {a:"97810", b:"97811", type:"block"},
    {a:"20553", b:"20550", type:"modifier", modifier:"59"},
    {a:"99213", b:"97810", type:"modifier", modifier:"25"}
  ];

  const EXCLUDES1 = [
    {a:"M54.5", b:"M54.59"},
    {a:"E11.9", b:"E11.65"}
  ];

  lines.forEach(line=>{

    let parts = line.split("-");
    let cpt = parts[0].trim();
    let mod = parts[1]?.trim();
    let icds = parts[2]?.split(",").map(x=>x.trim()) || [];

    let status = "ok";
    let msg = `<b>🔵 CPT ${cpt}</b><br>`;

    // NCCI
    NCCI.forEach(rule=>{
      if((rule.a===cpt && allCPTs.includes(rule.b)) || (rule.b===cpt && allCPTs.includes(rule.a))){

        if(rule.type==="block"){
          status="error";
          msg += `❌ NCCI: ${rule.a} & ${rule.b} cannot be billed together<br>`;
        }

        if(rule.type==="modifier"){
          if(mod===rule.modifier){
            status="warn";
            msg += `🟠 Allowed with modifier ${rule.modifier}<br>`;
          }else{
            status="error";
            msg += `❌ Add modifier ${rule.modifier}<br>`;
          }
        }
      }
    });

    // EXCLUDES1
    icds.forEach(icd1=>{
      icds.forEach(icd2=>{
        EXCLUDES1.forEach(rule=>{
          if((rule.a===icd1 && rule.b===icd2) || (rule.a===icd2 && rule.b===icd1)){
            status="error";
            msg += `⛔ Excludes1: ${icd1} & ${icd2}<br>`;
          }
        });
      });
    });

    // Modifier suggestion
    if(cpt==="99213" && !mod){
      msg += `💡 Suggest modifier 25 if E/M with procedure<br>`;
      status="warn";
    }

    msg += `🟢 ICD: ${icds.join(", ")}`;

    output += `<div class="result-box ${status}">${msg}</div>`;
  });

  document.getElementById("auditResult").innerHTML = output;
}

</script></body>
</html>
