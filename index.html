<!DOCTYPE html>
<html>
<head>
  <title>Medical Coding Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      color: #333;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Medical Coding Assistant</h1>

    <input type="text" id="search" placeholder="Enter denial or CPT code">

    <button onclick="search()">Search</button>

    <p id="result"></p>
  </div>

  <script>
async function search() {
  let input = document.getElementById("search").value;

  document.getElementById("result").innerText = "Loading...";

  try {
    let response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer YOUR_API_KEY",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          {
            role: "system",
            content: "You are a medical coding assistant. Give short, accurate answers for CPT, ICD, modifiers, and denial reasons."
          },
          {
            role: "user",
            content: input
          }
        ]
      })
    });

    let data = await response.json();
    let answer = data.choices[0].message.content;

    document.getElementById("result").innerText = answer;

  } catch (error) {
    document.getElementById("result").innerText = "Error. Try again.";
  }
}
</script>
