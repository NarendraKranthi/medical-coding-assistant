<!DOCTYPE html>
<html>
<head>
  <title>Medical Coding Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }

    #result {
      margin-top: 20px;
      text-align: left;
      white-space: pre-line;
      font-size: 14px;
      color: #333;
    }

    #reference {
      margin-top: 10px;
      font-size: 14px;
    }

    a {
      color: #007BFF;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Medical Coding Assistant</h1>
    <p>Enter CPT / ICD / Denial + Optional Insurance</p>

    <input type="text" id="search" placeholder="Enter denial or CPT code">

    <input type="text" id="payer" placeholder="Enter Insurance (e.g. Medicare, Aetna)">

    <button onclick="search()">Search</button>

    <p id="result"></p>
    <p id="reference"></p>
  </div>

<script>
function formatResponse(text) {
  return text
    .replace(/###/g, "") // remove unwanted ###
    .replace("Brief Answer:", "<b>✅ Brief Answer:</b><br>")
    .replace("Common Causes:", "<br><br><b>🔸 Common Causes:</b><br>")
    .replace("Fix / Action Steps:", "<br><br><b>🛠️ Fix / Action Steps:</b><br>")
    .replace("Simple Summary:", "<br><br><b>💡 Simple Summary:</b><br>")
    .replace(/\n/g, "<br>")
    .replace(/- /g, "• ");
}

async function search() {
  let input = document.getElementById("search").value;
  let payer = document.getElementById("payer").value.toLowerCase();

  document.getElementById("result").innerHTML = "Loading...";
  document.getElementById("reference").innerHTML = "";

  try {
    let res = await fetch("https://medical-coding-assistant.onrender.com/api/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        query: input,
        payer: payer
      })
    });

    let data = await res.json();

    let formatted = formatResponse(data.answer);
    document.getElementById("result").innerHTML = formatted;

    // Reference links
    let ref = "";

    if (payer.includes("medicare")) {
      ref = `<a href="https://www.cms.gov/medicare" target="_blank">View Medicare Guidelines</a>`;
    } 
    else if (payer.includes("aetna")) {
      ref = `<a href="https://www.aetna.com/health-care-professionals.html" target="_blank">View Aetna Policy</a>`;
    } 
    else if (payer.includes("united")) {
      ref = `<a href="https://www.uhcprovider.com/" target="_blank">View UnitedHealthcare Policy</a>`;
    } 
    else if (payer.includes("blue")) {
      ref = `<a href="https://www.bcbs.com/" target="_blank">View BCBS Guidelines</a>`;
    }

    document.getElementById("reference").innerHTML = ref;

  } catch (error) {
    document.getElementById("result").innerHTML = "❌ Error connecting to backend.";
  }
}
</script>

</body>
</html>
