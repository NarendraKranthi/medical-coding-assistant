<!DOCTYPE html>
<html>
<head>
  <title>Medical Coding Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    p {
      color: #555;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #0d6efd;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0b5ed7;
    }

    #result {
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    #reference {
      margin-top: 15px;
      font-size: 14px;
    }

    .card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
    }

    .loader {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      color: #0d6efd;
    }

    a {
      color: #0d6efd;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  🏥 Medical Coding Assistant
</header>

<div class="container">

  <p>Enter CPT / ICD / Denial + Optional Insurance</p>

  <input type="text" id="search" placeholder="Enter denial or CPT code">

  <input type="text" id="payer" placeholder="Enter Insurance (e.g. Medicare, Aetna)">

  <button onclick="search()">Search</button>

  <div id="loader" class="loader"></div>

  <div id="result"></div>

  <div id="reference"></div>

</div>

<script>

function formatResponse(text) {
  return text
    .replace(/###/g, "")
    .replace("Brief Answer:", "<b>✅ Brief Answer:</b><br>")
    .replace("Common Causes:", "<br><br><b>🔸 Common Causes:</b><br>")
    .replace("Fix / Action Steps:", "<br><br><b>🛠️ Fix / Action Steps:</b><br>")
    .replace("Simple Summary:", "<br><br><b>💡 Simple Summary:</b><br>")
    .replace(/\n/g, "<br>")
    .replace(/- /g, "• ");
}

async function search() {
  let input = document.getElementById("search").value;
  let payer = document.getElementById("payer").value.toLowerCase();

  document.getElementById("loader").innerHTML = "🔄 Fetching AI response...";
  document.getElementById("result").innerHTML = "";
  document.getElementById("reference").innerHTML = "";

  try {
    let response = await fetch("https://medical-coding-assistant.onrender.com/api/search", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        query: input,
        payer: payer
      })
    });

    let data = await response.json();

    let formatted = formatResponse(data.answer);

    document.getElementById("loader").innerHTML = "";
    document.getElementById("result").innerHTML = `<div class="card">${formatted}</div>`;

    // Reference links
    let ref = "";

    if (payer.includes("medicare")) {
      ref = `<a href="https://www.cms.gov/medicare" target="_blank">View Medicare Guidelines</a>`;
    } 
    else if (payer.includes("aetna")) {
      ref = `<a href="https://www.aetna.com/health-care-professionals.html" target="_blank">View Aetna Policy</a>`;
    } 
    else if (payer.includes("united")) {
      ref = `<a href="https://www.uhcprovider.com/" target="_blank">View UnitedHealthcare Policy</a>`;
    } 
    else if (payer.includes("blue")) {
      ref = `<a href="https://www.bcbs.com/" target="_blank">View BCBS Guidelines</a>`;
    }

    document.getElementById("reference").innerHTML = ref;

  } catch (error) {
    document.getElementById("loader").innerHTML = "";
    document.getElementById("result").innerHTML = "❌ Error connecting to backend.";
  }
}

</script>

</body>
</html>
