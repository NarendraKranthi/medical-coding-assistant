<!DOCTYPE html>
<html>
<head>
  <title>Medical Coding Assistant</title>
</head>
<body>

<h1>Medical Coding Assistant</h1>

<input type="text" id="search" placeholder="Enter denial or code">
<button onclick="search()">Search</button>

<p id="result"></p>

<script>
function search() {
  let input = document.getElementById("search").value.toLowerCase();
  
  if (input.includes("modifier")) {
    document.getElementById("result").innerText =
      "Denial Reason: Missing modifier. Fix: Add appropriate modifier based on procedure.";
  } else if (input.includes("99213")) {
    document.getElementById("result").innerText =
      "CPT 99213: Check documentation, medical necessity, and correct modifier usage.";
  } else {
    document.getElementById("result").innerText =
      "No data found. Try another keyword.";
  }
}
</script>

</body>
</html>
