<!DOCTYPE html>
<html>
<head>
  <title>Medical Coding Assistant</title>

  <style>
    body { font-family: Arial; background: #eef2f7; margin:0; }
    header { background:#0d6efd; color:#fff; padding:15px; text-align:center; font-size:20px; }
    .container { max-width:600px; margin:20px auto; background:#fff; padding:20px; border-radius:10px; }
    input { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; }
    button { width:100%; padding:12px; background:#0d6efd; color:#fff; border:none; border-radius:5px; margin-top:10px; }
    .card { background:#f8f9fa; padding:15px; border-radius:8px; margin-top:10px; }
    #history div, #important div { padding:8px; border-bottom:1px solid #ddd; cursor:pointer; }
  </style>
</head>

<body>

<header>🏥 Medical Coding Assistant</header>

<div class="container">

  <input id="search" placeholder="Enter CPT / ICD / Denial / Full text">
  <input id="payer" placeholder="Insurance (optional)">
  <button onclick="search()">Search</button>

  <p id="type"></p>
  <div id="loader"></div>
  <div id="result"></div>
  <div id="reference"></div>

  <h3>📜 History</h3>
  <div id="history"></div>

  <h3>⭐ Important</h3>
  <div id="important"></div>

</div>

<script>

// 🔍 Detect input type
function detectType(input){
  input = input.toUpperCase();
  if (/^\d{5}$/.test(input)) return "CPT Code";
  if (/^[A-Z]\d{2}/.test(input)) return "ICD Code";
  if (/(CO|PR|OA|PI)-\d+/.test(input)) return "Denial Code";
  return "Complex Case";
}

// 🔗 Extract denial code
function extractDenial(text){
  let match = text.toUpperCase().match(/(CO|PR|OA|PI)-\d+/);
  return match ? match[0] : null;
}

// 📜 Load History
function loadHistory(){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let html="";
  history.forEach((item,i)=>{
    html += `<div onclick="loadOld(${i})">🔍 ${item.input}</div>`;
  });
  document.getElementById("history").innerHTML = html;
}

// ⭐ Load Important
function loadImportant(){
  let data = JSON.parse(localStorage.getItem("important")) || [];
  let html="";
  data.forEach((item,i)=>{
    html += `<div onclick="loadImp(${i})">⭐ ${item.input}</div>`;
  });
  document.getElementById("important").innerHTML = html;
}

// Load old result
function loadOld(i){
  let history = JSON.parse(localStorage.getItem("history"));
  document.getElementById("result").innerHTML = `<div class="card">${history[i].result}</div>`;
}

// Load important
function loadImp(i){
  let data = JSON.parse(localStorage.getItem("important"));
  document.getElementById("result").innerHTML = `<div class="card">${data[i].result}</div>`;
}

// ⭐ Save important
function saveImportant(){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let important = JSON.parse(localStorage.getItem("important")) || [];
  important.unshift(history[0]);
  localStorage.setItem("important", JSON.stringify(important));
  loadImportant();
  alert("Saved ⭐");
}

// 🔍 Search
async function search(){

  let input = document.getElementById("search").value;
  let payer = document.getElementById("payer").value;

  document.getElementById("type").innerHTML = "Detected: " + detectType(input);
  document.getElementById("loader").innerHTML = "Loading...";
  document.getElementById("result").innerHTML = "";

  let res = await fetch("https://medical-coding-assistant.onrender.com/api/search",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({query:input, payer:payer})
  });

  let data = await res.json();

  let formatted = data.answer.replace(/\n/g,"<br>");

  document.getElementById("loader").innerHTML = "";
  document.getElementById("result").innerHTML = `
    <div class="card">
      ${formatted}
      <br><br>
      <button onclick="saveImportant()">⭐ Save Important</button>
    </div>
  `;

  // Save history
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.unshift({input:input, result:formatted});
  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();

  // Reference
  let code = extractDenial(input);
  if(code){
    document.getElementById("reference").innerHTML =
      `<a href="https://www.google.com/search?q=${code}+denial" target="_blank">🔎 ${code} Details</a>`;
  }

}

// Load data
window.onload = function(){
  loadHistory();
  loadImportant();
};

</script>

</body>
</html>
