<!DOCTYPE html><html>
<head>
<title>Medical Coding Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body { font-family: Arial; background:#f3f6fb; margin:0; }

.header { background:#2563eb; color:white; padding:15px; text-align:center; font-weight:bold; }

.container { max-width:800px; margin:20px auto; background:white; padding:20px; border-radius:10px; }

.tabs { display:flex; margin-bottom:15px; }
.tab { flex:1; padding:10px; text-align:center; background:#e5e7eb; cursor:pointer; }
.active { background:#2563eb; color:white; }

textarea, input {
  width:100%; padding:10px; margin-top:10px;
  border-radius:6px; border:1px solid #ccc;
}

button {
  width:100%; padding:10px; margin-top:10px;
  background:#2563eb; color:white; border:none;
  border-radius:6px;
}

.card {
  margin-top:12px; padding:12px;
  border-radius:8px;
}

.ok { background:#ecfdf5; }
.warn { background:#fff7ed; }
.error { background:#fee2e2; }

.cpt { background:#dbeafe; padding:3px 6px; border-radius:4px; }
.icd { background:#dcfce7; padding:3px 6px; border-radius:4px; }

</style></head><body><div class="header">🏥 Medical Coding Assistant</div><div class="container"><div class="tabs">
  <div class="tab active" onclick="switchTab('denial',event)">Denial</div>
  <div class="tab" onclick="switchTab('audit',event)">Audit</div>
</div><!-- DENIAL --><div id="denialTab">
  <input id="query" placeholder="Enter denial / CPT / ICD">
  <button onclick="runDenial()">Search</button>
  <div id="denialResult"></div>
</div><!-- AUDIT --><div id="auditTab" style="display:none;">
  <textarea id="auditInput" rows="6" placeholder="Enter CPT / ICD / Modifier"></textarea>
  <button onclick="runAudit()">Run Audit</button>
  <div id="auditResult"></div>
</div></div><script>

// TAB
function switchTab(tab,e){
  document.getElementById("denialTab").style.display = tab==="denial"?"block":"none";
  document.getElementById("auditTab").style.display = tab==="audit"?"block":"none";
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  e.target.classList.add("active");
}

// ---------------- SMART PARSER ----------------
function parseLine(line){

  let tokens = line
    .replace(/-/g," ")
    .replace(/,/g," ")
    .split(/\s+/)
    .filter(Boolean);

  let cpt="", mod="", icds=[];

  tokens.forEach(t=>{
    if(/^\d{5}$/.test(t)) cpt = t;
    else if(/^\d{2}$/.test(t)) mod = t;
    else if(/^[A-TV-Z]\d{2}(\.\d+)?$/.test(t)) icds.push(t);
  });

  return {cpt, mod, icds};
}

// ---------------- CMS-LIKE NCCI DATA ----------------
const NCCI_DATA = [
  {col1:"20553", col2:"20550", mod:"0"},
  {col1:"99213", col2:"97810", mod:"1"},
  {col1:"97810", col2:"97811", mod:"0"}
];

// ---------------- DENIAL ----------------
function runDenial(){
  let input = document.getElementById("query").value;

  document.getElementById("denialResult").innerHTML =
    `<div class="card ok">
      <b>Demo Response:</b><br>${input}
    </div>`;
}

// ---------------- AUDIT ----------------
function runAudit(){

  let lines = document.getElementById("auditInput").value.trim().split("\n");
  let parsed = lines.map(parseLine);
  let allCPTs = parsed.map(p=>p.cpt);

  let output = "";

  parsed.forEach(item=>{

    let {cpt, mod, icds} = item;

    let status="ok";
    let msg = `<b>🔵 CPT <span class="cpt">${cpt}</span></b><br>`;

    // NCCI CHECK
    NCCI_DATA.forEach(rule=>{

      if(allCPTs.includes(rule.col1) && allCPTs.includes(rule.col2)){

        if(cpt === rule.col2){
          status="error";
          msg += `❌ Column2 (${rule.col2}) cannot be billed with Column1 (${rule.col1})<br>`;
        }

        if(rule.mod === "0"){
          status="error";
          msg += `🚫 Modifier NOT allowed<br>`;
        }

        if(rule.mod === "1"){
          if(mod==="59"){
            status="warn";
            msg += `🟠 Modifier 59 used correctly<br>`;
          } else {
            status="warn";
            msg += `💡 Suggest Modifier 59<br>`;
          }
        }

      }

    });

    msg += `🟢 ICD: ${icds.map(i=>`<span class="icd">${i}</span>`).join(", ")}`;

    output += `<div class="card ${status}">${msg}</div>`;

  });

  document.getElementById("auditResult").innerHTML = output;
}

</script></body>
</html>
