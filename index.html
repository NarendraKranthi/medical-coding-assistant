<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Medical Coding Assistant</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}

.header {
  background:#2d6cdf;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container {
  padding:15px;
}

.tabs {
  display:flex;
  margin-bottom:10px;
}

.tab {
  flex:1;
  padding:10px;
  text-align:center;
  background:#ddd;
  cursor:pointer;
}

.tab.active {
  background:#2d6cdf;
  color:white;
}

textarea {
  width:100%;
  height:130px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:10px;
  padding:10px;
  background:#2d6cdf;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.card {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-top:12px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.red { background:#ffe5e5; }
.orange { background:#fff3cd; }
.green { background:#e6ffe6; }

.code {
  font-weight:bold;
  color:#2d6cdf;
}
</style>
</head>

<body>

<div class="header">🏥 Medical Coding Assistant</div>

<div class="container">

<div class="tabs">
  <div class="tab active" onclick="switchTab('denial')">Denial</div>
  <div class="tab" onclick="switchTab('audit')">Audit</div>
</div>

<!-- DENIAL -->
<div id="denialBox">
<textarea id="denialInput" placeholder="Enter CPT / ICD / Denial"></textarea>
<button onclick="runDenial()">Search</button>
<div id="denialResult"></div>
</div>

<!-- AUDIT -->
<div id="auditBox" style="display:none;">
<textarea id="auditInput" placeholder="Example:
99213 - M54.59
97810 - M54.2
97811 - M54.2"></textarea>

<button onclick="runAudit()">Run Audit</button>
<div id="auditResult"></div>
</div>

</div>

<script>

/* ================= TAB ================= */
function switchTab(type){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  if(type==="denial"){
    denialBox.style.display="block";
    auditBox.style.display="none";
    document.querySelectorAll(".tab")[0].classList.add("active");
  } else {
    denialBox.style.display="none";
    auditBox.style.display="block";
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
}

/* ================= NCCI LOAD ================= */
let ncciData = [];

async function loadNCCI(){
  const res = await fetch("ncci.csv");
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  ncciData = rows.map(r=>{
    let c = r.split(",");

    return {
      group: c[0]?.trim(),      // Column1
      cpt: c[1]?.trim(),        // Column2
      modifier: c[5]?.trim() || c[4]?.trim() // fallback
    };
  });

  console.log("NCCI Loaded:", ncciData.length);
}

loadNCCI();

/* ================= PARSER ================= */
function parseInput(text){
  let lines = text.split("\n");
  let data = [];

  lines.forEach(line=>{
    if(!line.trim()) return;

    let parts = line.split("-");
    let cpt = parts[0]?.trim();

    let icd = [];
    if(parts[1]){
      icd = parts[1].split(",").map(x=>x.trim());
    }

    data.push({cpt, icd});
  });

  return data;
}

/* ================= NCCI GROUP LOGIC ================= */
function checkNCCI(cpts){

  let groups = {};

  // group CPTs
  ncciData.forEach(row=>{
    if(!groups[row.group]){
      groups[row.group] = [];
    }
    groups[row.group].push(row);
  });

  let results = [];

  Object.values(groups).forEach(group=>{

    let groupCPTs = group.map(x=>x.cpt);

    let matched = cpts.filter(c => groupCPTs.includes(c));

    if(matched.length > 1){

      for(let i=0;i<matched.length;i++){
        for(let j=i+1;j<matched.length;j++){

          let mod = group.find(x => x.cpt === matched[i])?.modifier;

          let status="";
          let cls="green";

          if(mod==="0"){
            status="❌ Do NOT Code Together";
            cls="red";
          }
          else if(mod==="1"){
            status="⚠️ Modifier Required (59/XS/XE)";
            cls="orange";
          }
          else{
            status="Allowed";
          }

          results.push({
            c1: matched[i],
            c2: matched[j],
            status,
            cls
          });
        }
      }
    }

  });

  return results;
}

/* ================= AUDIT ================= */
function runAudit(){

  let input = document.getElementById("auditInput").value;

  let parsed = parseInput(input);

  let cpts = parsed.map(x=>x.cpt);

  let edits = checkNCCI(cpts);

  let html="";

  parsed.forEach(item=>{
    html += `
    <div class="card green">
      <div class="code">CPT ${item.cpt}</div>
      ICD: ${item.icd.join(", ")}
    </div>`;
  });

  if(edits.length === 0){
    html += `<div class="card">No NCCI conflicts found</div>`;
  }

  edits.forEach(e=>{
    html += `
    <div class="card ${e.cls}">
      ${e.c1} + ${e.c2} → ${e.status}
    </div>`;
  });

  document.getElementById("auditResult").innerHTML = html;
}

/* ================= DENIAL ================= */
function runDenial(){
  let text = document.getElementById("denialInput").value;

  let html = `
  <div class="card">
  <b>✅ Brief Answer:</b><br>
  Possible denial due to documentation or coding issue.<br><br>

  <b>🔸 Common Causes:</b><br>
  Missing documentation<br>
  Incorrect modifier<br><br>

  <b>🛠️ Fix:</b><br>
  Review notes and resubmit<br><br>

  <b>💡 Summary:</b><br>
  Validate coding and documentation.
  </div>`;

  document.getElementById("denialResult").innerHTML = html;
}

</script>

</body>
</html>
