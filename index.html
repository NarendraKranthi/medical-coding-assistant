<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Medical Coding Assistant</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
.header { background:#2d6cdf; color:white; padding:15px; text-align:center; font-size:20px; }
.container { padding:15px; }
.tabs { display:flex; margin-bottom:10px; }
.tab { flex:1; padding:10px; text-align:center; background:#ddd; cursor:pointer; }
.tab.active { background:#2d6cdf; color:white; }
textarea { width:100%; height:130px; padding:10px; border-radius:8px; border:1px solid #ccc; }
select, button { width:100%; padding:10px; margin-top:10px; border-radius:6px; }
button { background:#2d6cdf; color:white; border:none; }
.card { padding:12px; border-radius:10px; margin-top:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.red { background:#ffe5e5; }
.orange { background:#fff3cd; }
.green { background:#e6ffe6; }
.code { font-weight:bold; color:#2d6cdf; }
</style>
</head>

<body>

<div class="header">🏥 Medical Coding Assistant</div>

<div class="container">

<div class="tabs">
  <div class="tab active" onclick="switchTab('audit')">Audit</div>
  <div class="tab" onclick="switchTab('denial')">Denial</div>
</div>

<!-- AUDIT -->
<div id="auditBox">

<select id="state">
  <option value="general">General</option>
  <option value="CA">California</option>
  <option value="TX">Texas</option>
  <option value="NY">New York</option>
</select>

<textarea id="input" placeholder="99213 - I10
97810 - M54.5"></textarea>

<button onclick="runAudit()">Run Audit</button>

<div id="result"></div>

</div>

<!-- DENIAL -->
<div id="denialBox" style="display:none;">
<textarea placeholder="Enter denial reason"></textarea>
<button>Search</button>
</div>

</div>

<script>

/* 🔗 YOUR BACKEND URL */
const API = "https://medical-coding-assistant-1.onrender.com";

/* ---------- TAB ---------- */
function switchTab(type){
  auditBox.style.display = type==="audit" ? "block":"none";
  denialBox.style.display = type==="denial" ? "block":"none";
}

/* ---------- FETCH CMS ---------- */
async function fetchCMS(cpt,state){
  try{
    let res = await fetch(`${API}/lcd/${cpt}/${state}`);
    return await res.json();
  }catch{
    return null;
  }
}

/* ---------- LOAD NCCI ---------- */
let ncciData=[];
fetch("ncci.csv").then(r=>r.text()).then(t=>{
  let rows=t.split("\n").slice(1);
  ncciData=rows.map(r=>{
    let c=r.split(",");
    return {group:c[0],cpt:c[1],mod:c[5]||c[4]};
  });
});

/* ---------- EXCLUDES ---------- */
let EXCLUDES={};
fetch("icd_excludes1.json").then(r=>r.json()).then(d=>EXCLUDES=d);

function getCat(x){return x.split(".")[0];}

/* ---------- PARSE ---------- */
function parse(text){
  return text.split("\n").map(l=>{
    let p=l.split("-");
    return {cpt:p[0]?.trim(), icd:p[1]?.split(",").map(x=>x.trim())||[]};
  }).filter(x=>x.cpt);
}

/* ---------- RUN AUDIT ---------- */
async function runAudit(){

  let input=document.getElementById("input").value;
  let state=document.getElementById("state").value;

  let data=parse(input);

  let html="";
  let allICD=[];

  for(let d of data){

    allICD.push(...d.icd);

    let cms=await fetchCMS(d.cpt,state);

    let cls="orange";
    let text="🟠 No CMS Data";

    if(/^99/.test(d.cpt)){
      cls="green";
      text="🟢 E/M Service (Covered)";
    }

    else if(cms && cms.icds){

      let match=d.icd.some(icd=>
        cms.icds.some(c=>c.startsWith(getCat(icd)))
      );

      if(match){
        cls="green";
        text=`🟢 Supported (${state} | ${cms.lcd})<br>
        <a href="https://www.cms.gov/medicare-coverage-database/view/lcd.aspx?LCDId=${cms.lcd}" target="_blank">View LCD</a>`;
      }else{
        cls="red";
        text=`🔴 Not Supported (${state} | ${cms.lcd})<br><br>
Reason: Diagnosis not covered under LCD<br>
Suggestion: Verify documentation or use supported ICD`;
      }
    }

    html+=`
    <div class="card ${cls}">
      <div class="code">CPT ${d.cpt}</div>
      ICD: ${d.icd.join(", ")}<br><br>${text}
    </div>`;
  }

  /* Excludes */
  for(let i=0;i<allICD.length;i++){
    for(let j=i+1;j<allICD.length;j++){
      if(EXCLUDES[allICD[i]]?.includes(allICD[j])){
        html+=`<div class="card red">${allICD[i]} + ${allICD[j]} → Excludes1</div>`;
      }
    }
  }

  /* NCCI */
  let cpts=data.map(x=>x.cpt);
  let seen=new Set();

  ncciData.forEach(r=>{
    let m=cpts.filter(c=>c===r.cpt);
    if(m.length>1){
      let key=r.cpt;
      if(!seen.has(key)){
        seen.add(key);
        html+=`<div class="card orange">${r.cpt} → Modifier ${r.mod}</div>`;
      }
    }
  });

  document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
